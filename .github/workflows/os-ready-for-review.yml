name: OS Ready for review
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  request_doc_review:
    name: Request a review from the docs-content team
    if: github.event.label.name == 'waiting for review' && github.repository == 'github/docs'
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo content
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Check if this run was triggered by a member of the docs team
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      id: triggered-by-member
      with:
        github-token: ${{secrets.DOCS_BOT_PAT_BASE}}
        result-encoding: string
        script: "const triggerer_login = context.payload.sender.login\nconst teamMembers\
          \ = await github.request(\n  `/orgs/github/teams/docs/members?per_page=100`\n\
          )\nconst logins = teamMembers.data.map(member => member.login)\nif (logins.includes(triggerer_login))\
          \ {\n  console.log(`This workflow was triggered by ${triggerer_login} (on\
          \ the docs team).`)\n  return 'true'\n}\nconsole.log(`This workflow was\
          \ triggered by ${triggerer_login} (not on the docs team), so no action will\
          \ be taken.`)\nreturn 'false'\n"
    - name: Exit if not triggered by a docs team member
      if: steps.triggered-by-member.outputs.result == 'false'
      run: 'echo Aborting. This workflow must be triggered by a member of the docs
        team.

        exit 1

        '
    - name: Setup Node.js
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
      with:
        node-version-file: package.json
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Run script
      run: 'npm run ready-for-docs-review

        '
      env:
        TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
        PROJECT_NUMBER: 2936
        ORGANIZATION: github
        ITEM_NODE_ID: ${{ github.event.pull_request.node_id || github.event.issue.node_id
          }}
        AUTHOR_LOGIN: ${{ github.event.pull_request.user.login || github.event.issue.user.login
          }}
        REPO: ${{ github.repository }}
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'pull_request_target' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
