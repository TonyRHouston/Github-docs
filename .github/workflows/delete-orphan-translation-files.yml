name: Delete orphan translation files
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  delete-orphan-translation-files:
    if: github.repository == 'github/docs-internal'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - language: zh
          language_dir: translations/zh-cn
          language_repo: github/docs-internal.zh-cn
        - language: es
          language_dir: translations/es-es
          language_repo: github/docs-internal.es-es
        - language: pt
          language_dir: translations/pt-br
          language_repo: github/docs-internal.pt-br
        - language: ru
          language_dir: translations/ru-ru
          language_repo: github/docs-internal.ru-ru
        - language: ja
          language_dir: translations/ja-jp
          language_repo: github/docs-internal.ja-jp
        - language: fr
          language_dir: translations/fr-fr
          language_repo: github/docs-internal.fr-fr
        - language: de
          language_dir: translations/de-de
          language_repo: github/docs-internal.de-de
        - language: ko
          language_dir: translations/ko-kr
          language_repo: github/docs-internal.ko-kr
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Checkout the language-specific repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        repository: ${{ matrix.language_repo }}
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
        path: ${{ matrix.language_dir }}
    - uses: ./.github/actions/node-npm-setup
    - name: Delete orphan files
      run: 'npm run delete-orphan-translation-files -- ${{ matrix.language_dir }}

        '
    - name: Debug deleted files
      working-directory: ${{ matrix.language_dir }}
      run: git status
    - name: Git config
      working-directory: ${{ matrix.language_dir }}
      run: 'git config --global user.name "docs-bot"

        git config --global user.email "77750099+docs-bot@users.noreply.github.com"

        '
    - name: Git commit and push, create and merge PR
      working-directory: ${{ matrix.language_dir }}
      env:
        GH_TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
      run: "# If nothing to commit, exit now. It's fine. No orphans.\nchanges=$(git\
        \ diff --name-only | wc -l)\nuntracked=$(git status --untracked-files --short\
        \ | wc -l)\nif [[ $changes -eq 0 ]] && [[ $untracked -eq 0 ]]; then\n  echo\
        \ \"There are no changes to commit or untracked files. Exiting.\"\n  exit\
        \ 0\nfi\n\n# Create a general retry function that retries and sleeps\nretry_command()\
        \ {\n  local max_attempts=3\n  local attempt=1\n\n  while [ $attempt -le $max_attempts\
        \ ]; do\n    echo \"Attempt $attempt: $@\"\n    \"$@\" && return 0\n    ((attempt++))\n\
        \    sleep 3 # You can adjust the sleep duration as needed\n  done\n\n  echo\
        \ \"Max attempts reached. Command failed after $max_attempts attempts.\"\n\
        \  return 1\n}\n\ngit status\ncurrent_timestamp=$(date '+%Y-%m-%d-%H%M%S')\n\
        branch_name=\"delete-orphan-files-$current_timestamp\"\ngit checkout -b \"\
        $branch_name\"\ncurrent_daystamp=$(date '+%Y-%m-%d')\ngit commit -a -m \"\
        Delete orphan files ($current_daystamp)\"\ngit push origin \"$branch_name\"\
        \n\n# Create PR\necho \"Creating pull request...\"\ngh pr create \\\n  --title\
        \ \"Delete orphan files ($current_daystamp)\" \\\n  --body '\U0001F44B humans.\
        \ This PR was generated from docs-internal/.github/workflows/delete-orphan-translation-files.yml.\n\
        \  ' \\\n  --repo \"${{ matrix.language_repo }}\" \\\n  --label \"workflow-generated\"\
        \ \\\n  --head=$branch_name\necho \"Merge created PR...\"\nretry_command gh\
        \ pr merge --merge --auto --delete-branch \"$branch_name\"\n"
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
