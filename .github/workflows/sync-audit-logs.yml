name: Sync Audit Log data
on:
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref
    || github.ref }}
  cancel-in-progress: true
jobs:
  update-audit-log-files:
    if: github.repository == 'github/docs-internal'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/node-npm-setup
    - name: Run updater script
      env:
        GITHUB_TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
      run: 'npm run sync-audit-log

        '
    - name: Get the audit-log-allowlists SHA being synced
      id: audit-log-allowlists
      run: "COMMIT_SHA=$(cat src/audit-logs/lib/config.json | jq -r '.sha')\necho\
        \ \"COMMIT_SHA=$COMMIT_SHA\" >> $GITHUB_OUTPUT\necho \"Commit SHA from audit-log-allowlists:\
        \ $COMMIT_SHA\"\nif [ -z $COMMIT_SHA ]; then\n  echo \"audit-log-allowlists\
        \ commit SHA is empty!\"\n  exit 1\nfi\n"
    - name: Create and merge pull request
      env:
        GITHUB_TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
      run: "echo \"Creating a new branch if needed...\"\nbranchname=audit-logs-schema-update-${{\
        \ steps.audit-log-allowlists.outputs.COMMIT_SHA }}\nremotesha=$(git ls-remote\
        \ --heads origin $branchname)\nif [ -n \"$remotesha\" ]; then\n  # output\
        \ is not empty, it means the remote branch exists\n  echo \"Branch $branchname\
        \ already exists in 'github/docs-internal'. Exiting...\"\n  exit 0\nfi\ngit\
        \ checkout -b $branchname\necho \"Created a new branch $branchname\"\n\necho\
        \ \"Preparing commit...\"\ngit config --global user.name \"docs-bot\"\ngit\
        \ config --global user.email \"77750099+docs-bot@users.noreply.github.com\"\
        \ngit add -A .\necho \"Prepared commit\"\n\necho \"Check if there are changes...\"\
        \nif git diff-index --cached --quiet HEAD -- . ':(exclude)src/audit-logs/lib/config.json'\n\
        then\n  echo \"No real changes (only the SHA in config.json moved). Exiting\u2026\
        \"\n  exit 0\nfi\necho \"Changes detected, proceeding\"\n\necho \"Creating\
        \ commit...\"\ngit commit -m \"Add updated audit log event data\"\necho \"\
        Created commit\"\n\necho \"Pushing commit...\"\ngit push origin $branchname\n\
        echo \"Pushed commit\"\n\necho \"Creating pull request...\"\ngh pr create\
        \ \\\n  --title \"Update audit log event data\" \\\n  --body '\U0001F44B Docs\
        \ First Responder. This PR updates the audit log event data with the latest\
        \ changes, synced from github/audit-log-allowlists.\n  Make sure the PR builds\
        \ successfully and there are no gross errors (for example, a file is deleted).\
        \ You do not need to validate the contents (that is the responsibility of\
        \ product teams).\n  If CI does not pass or other problems arise, contact\
        \ #docs-engineering on slack.' \\\n  --repo github/docs-internal \\\n  --label\
        \ audit-log-pipeline,workflow-generated \\\n  --head=$branchname\necho \"\
        Created pull request\"\n\n# can't approve your own PR, approve with Actions\n\
        echo \"Approving pull request...\"\nunset GITHUB_TOKEN\ngh auth login --with-token\
        \ <<< \"${{ secrets.GITHUB_TOKEN }}\"\ngh pr review --approve\necho \"Approved\
        \ pull request\"\n\n# Actions can't merge the PR so back to docs-bot to merge\
        \ the PR\necho \"Setting pull request to auto merge...\"\nunset GITHUB_TOKEN\n\
        gh auth login --with-token <<< \"${{ secrets.DOCS_BOT_PAT_BASE }}\"\ngh pr\
        \ merge --auto\necho \"Set pull request to auto merge\"\n"
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
