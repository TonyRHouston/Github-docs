name: Validate OpenAPI Check Docker
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  validate-openapi-check:
    runs-on: ubuntu-latest
    if: github.repository == 'github/docs-internal'
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349
    - name: Build Docker image
      run: 'docker build -f Dockerfile.openapi_decorator -t openapi-decorator:test
        .

        '
    - name: Test Docker image with sample OpenAPI file
      run: 'docker run --rm openapi-decorator:test -f "src/rest/data/fpt-2022-11-28/schema.json"

        '
    - name: Test Docker image with multiple OpenAPI files
      run: "docker run --rm openapi-decorator:test \\\n  -f \"src/rest/data/fpt-2022-11-28/schema.json\"\
        \ \\\n  \"src/rest/data/ghec-2022-11-28/schema.json\"\n"
