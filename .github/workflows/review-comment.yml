name: Review comment
on:
  workflow_dispatch: {}
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref
    || github.ref }} x ${{ github.event_name }}
  cancel-in-progress: true
jobs:
  review-comment:
    if: ${{ github.event.pull_request.user.login != 'docs-bot' && (github.repository
      == 'github/docs-internal' || github.repository == 'github/docs') }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
    - name: check out repo content
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/node-npm-setup
    - name: Set APP_URL
      run: "if [[ \"${{ github.repository }}\" == \"github/docs-internal\" ]]; then\n\
        \  echo \"APP_URL=https://docs-internal-staging-TREE.githubapp.com/en\" >>\
        \ $GITHUB_ENV\nelif [[ \"${{ github.repository }}\" == 'github/docs' ]]; then\n\
        \  echo \"APP_URL=https://adjective-noun-hash-4000.app.github.dev\" >> $GITHUB_ENV\n\
        fi\n"
    - name: Find code changes comment
      uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad
      id: findComment
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: github-actions[bot]
        body-includes: <!-- REVIEW_COMMENT -->
    - name: Get changes table
      id: changes
      timeout-minutes: 30
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        APP_URL: ${{ env.APP_URL }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: npm run content-changes-table-comment
    - name: Update comment
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
      with:
        comment-id: ${{ steps.findComment.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        edit-mode: replace
        body: "<!-- REVIEW_COMMENT -->\n### How to review these changes \U0001F453\
          \n\nThank you for your contribution. To review these changes, choose one\
          \ of the following options:\n\n* [Spin up a codespace][codespace]\n* [Set\
          \ up a local development environment][local]\n${{ github.repository == 'github/docs-internal'\
          \ && '* [Deploy a staging server][staging]' || '' }}\n\n${{ fromJSON('[\"\
          A Hubber will need to deploy your changes internally to review.\",\"\"]')[github.repository\
          \ == 'github/docs-internal'] }}\n\n<details><summary>Table of review links</summary>\n\
          \n**Note**: Please update the URL for your staging server or codespace.\n\
          \n${{ steps.changes.outputs.changesTable && 'The table shows the files in\
          \ the `content` directory that were changed in this pull request. This helps\
          \ you review your changes on a staging server. Changes to the `data` directory\
          \ are not included in this table.' || '' }}\n\n${{ steps.changes.outputs.changesTable\
          \ || '_This pull request contains code changes, so we will not generate\
          \ a table of review links._' }}\n\n${{ steps.changes.outputs.changesTable\
          \ && 'Key: **fpt**: Free, Pro, Team; **ghec**: GitHub Enterprise Cloud;\
          \ **ghes**: GitHub Enterprise Server' || '' }}\n\n</details>\n\n\U0001F916\
          \ This comment is [automatically generated][workflow].\n\n[workflow]: ${{\
          \ github.server_url }}/${{ github.repository }}/blob/${{ github.workflow_sha\
          \ }}/.github/workflows/review-comment.yml\n[codespace]: ${{ github.repository\
          \ == 'github/docs-internal' && 'https://github.com/github/docs-team/blob/main/contributing-to-docs/tips-and-tricks/use-a-codespace-to-review.md'\
          \ || 'https://docs.github.com/en/contributing/setting-up-your-environment-to-work-on-github-docs/working-on-github-docs-in-a-codespace'\
          \ }}\n[local]: https://docs.github.com/en/contributing/setting-up-your-environment-to-work-on-github-docs/creating-a-local-environment#setting-up-your-local-environment\n\
          [staging]: https://github.com/github/docs-team/blob/main/contributing-to-docs/tips-and-tricks/deploying-pr-to-staging-servers.md\n"
