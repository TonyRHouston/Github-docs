name: Sync GraphQL schema
on:
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  update_graphql_files:
    if: github.repository == 'github/docs-internal'
    runs-on: ubuntu-latest
    outputs:
      ignored-changes: ${{ steps.sync.outputs.ignored-changes }}
      ignored-count: ${{ steps.sync.outputs.ignored-count }}
      ignored-types: ${{ steps.sync.outputs.ignored-types }}
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/node-npm-setup
    - name: Run updater scripts
      id: sync
      env:
        GITHUB_TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
      run: npm run sync-graphql
    - name: Create pull request
      id: create-pull-request
      uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725
      env:
        HUSKY: '0'
      with:
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
        commit-message: Update GraphQL data files
        title: GraphQL schema update
        body: "Hello! Some GraphQL data in github/github was updated recently. This\
          \ PR syncs up the GraphQL data in this repo.\n\n If CI passes, this PR will\
          \ be auto-merged. :green_heart:\n\n If CI does not pass or other problems\
          \ arise, contact #docs-engineering on slack."
        branch: graphql-schema-update
    - name: Enable GitHub auto-merge
      if: ${{ steps.create-pull-request.outputs.pull-request-number }}
      env:
        GITHUB_TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
        AUTOMERGE_PR_NUMBER: ${{ steps.create-pull-request.outputs.pull-request-number
          }}
      run: npm run enable-automerge
    - if: ${{ failure() }}
      name: Delete remote branch (if previous steps failed)
      run: git push origin --delete graphql-schema-update
    - if: ${{ steps.create-pull-request.outputs.pull-request-number }}
      name: Approve
      uses: juliangruber/approve-pull-request-action@dcc4effb325c0b503408619918d56e40653dcc91
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        number: ${{ steps.create-pull-request.outputs.pull-request-number }}
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
  notify_ignored_changes:
    if: github.repository == 'github/docs-internal' && needs.update_graphql_files.outputs.ignored-count
      > 0 && github.event_name != 'workflow_dispatch'
    needs: update_graphql_files
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/slack-alert
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
        color: warning
        message: "\u26A0\uFE0F GraphQL Sync found ${{ needs.update_graphql_files.outputs.ignored-count\
          \ }} ignored change types: ${{ needs.update_graphql_files.outputs.ignored-types\
          \ }}\n\nThese change types are not in CHANGES_TO_REPORT and were silently\
          \ ignored. Consider reviewing if they should be added to the changelog.\n\
          \nSee workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{\
          \ github.run_id }}\n"
