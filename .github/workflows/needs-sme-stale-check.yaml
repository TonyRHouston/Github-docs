name: Stale check for issues or PRs with "needs SME" label
on:
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  stale_needs-sme:
    if: ${{ github.repository == 'github/docs' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@3a9db7e6a41a89f618792c92c0e97cc736e1b13f
      with:
        only-labels: needs SME
        days-before-stale: 28
        stale-issue-message: This is a gentle reminder for the docs team that this
          issue is waiting for technical review by a subject matter expert (SME).
        stale-issue-label: Waiting on SME review
        days-before-issue-close: -1
        stale-pr-message: This is a gentle reminder for the docs team that this PR
          is waiting for technical review by a subject matter expert.
        stale-pr-label: Waiting on SME review
        days-before-pr-close: -1
    - name: Print outputs
      run: echo "Staled issues/PRs:${{ steps.stale.outputs.staled-issues-prs || '0'
        }}, Closed issues/PRs:${{ steps.stale.outputs.closed-issues-prs || '0' }}"
    - name: Check out repo
      if: ${{ failure() }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
