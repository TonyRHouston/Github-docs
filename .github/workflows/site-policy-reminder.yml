name: Site Policy Reminder
on:
  workflow_dispatch: {}
permissions:
  pull-requests: write
  contents: read
jobs:
  run:
    if: github.event.label.name == 'Site Policy' && github.repository == 'github/docs-internal'
    runs-on: ubuntu-latest
    steps:
    - uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
      env:
        GITHUB_TOKEN: ${{ secrets.API_TOKEN_SITEPOLICY }}
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: 'Before merging, please remember to change the title of this PR to a
          description of its changes that is suitable for public viewing on github/site-policy.


          <@github/site-policy-admins>, when these changes are ready to be synced
          to the site policy repo for the 24-hour or 30-day [review window](https://github.com/github/site-policy#whats-the-process),
          run the [site policy sync action](https://github.com/github/docs-internal/actions/workflows/site-policy-sync.yml)
          from this PR''s branch. When these changes are ready to be merged in `docs-internal`,
          let the Docs team know on Slack in #docs-content and a writer will merge
          this PR.

          '
