name: Enterprise date updater
on:
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  open_enterprise_issue:
    name: Enterprise date updater
    if: github.repository == 'github/docs-internal'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/node-npm-setup
    - name: Run src/ghes-releases/scripts/update-enterprise-dates.ts
      run: npm run update-enterprise-dates
      env:
        GITHUB_TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
    - name: Create pull request
      id: create-pull-request
      uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725
      env:
        HUSKY: '0'
      with:
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
        commit-message: "\U0001F916 ran src/ghes-releases/scripts/update-enterprise-dates.ts"
        title: "\U0001F916 src/ghes-releases/lib/enterprise-dates.json update"
        body: "Hello! The GitHub Enterprise Server release dates have changed.\n\n\
          \ If CI passes, this PR will be auto-merged. :green_heart:\n\n If CI does\
          \ not pass or other problems arise, contact #docs-engineering on slack.\n\
          \nThis PR was \U0001F916-crafted by `.github/workflows/enterprise-dates.yml`.\
          \ \U0001F9F6"
        branch: enterprise-server-dates-update
        delete-branch: true
    - name: Enable GitHub auto-merge
      if: ${{ steps.create-pull-request.outputs.pull-request-number }}
      env:
        GITHUB_TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
        AUTOMERGE_PR_NUMBER: ${{ steps.create-pull-request.outputs.pull-request-number
          }}
      run: npm run enable-automerge
    - if: ${{ failure() }}
      name: Delete remote branch (if previous steps failed)
      run: git push origin --delete enterprise-server-dates-update
    - if: ${{ steps.create-pull-request.outputs.pull-request-number }}
      name: Approve
      uses: juliangruber/approve-pull-request-action@dcc4effb325c0b503408619918d56e40653dcc91
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        number: ${{ steps.create-pull-request.outputs.pull-request-number }}
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
