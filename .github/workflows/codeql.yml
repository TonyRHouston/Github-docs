name: CodeQL analysis
on:
  workflow_dispatch: {}
permissions:
  actions: read
  contents: read
  security-events: write
concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref
    || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    if: github.repository == 'github/docs-internal' || github.repository == 'github/docs'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: github/codeql-action/init@e296a935590eb16afc0c0108289f68c87e2a89a5
      with:
        languages: javascript
    - uses: github/codeql-action/analyze@e296a935590eb16afc0c0108289f68c87e2a89a5
      continue-on-error: true
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'pull_request' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
