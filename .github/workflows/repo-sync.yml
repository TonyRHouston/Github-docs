name: Repo Sync
on:
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  repo-sync:
    if: github.repository == 'github/docs-internal' || github.repository == 'github/docs'
    name: Repo Sync
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        persist-credentials: false
    - name: Sync repo to branch
      uses: repo-sync/github-sync@3832fe8e2be32372e1b3970bbae8e7079edeec88
      with:
        source_repo: https://${{ secrets.DOCS_BOT_PAT_REPO_SYNC }}@github.com/github/${{
          github.repository == 'github/docs-internal' && 'docs' || 'docs-internal'
          }}.git
        source_branch: main
        destination_branch: repo-sync
        github_token: ${{ secrets.DOCS_BOT_PAT_REPO_SYNC }}
    - name: Ship pull request
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      with:
        github-token: ${{ secrets.DOCS_BOT_PAT_REPO_SYNC }}
        result-encoding: string
        script: "const { owner, repo } = context.repo\nconst head = 'github:repo-sync'\n\
          const base = 'main'\n\nasync function closePullRequest(prNumber) {\n  console.log('Closing\
          \ pull request', prNumber)\n  await github.rest.pulls.update({\n    owner,\n\
          \    repo,\n    pull_number: prNumber,\n    state: 'closed'\n  })\n  //\
          \ Error loud here, so no try/catch\n  console.log('Closed pull request',\
          \ prNumber)\n}\n\nconsole.log('Closing any existing pull requests')\nconst\
          \ { data: existingPulls } = await github.rest.pulls.list({ owner, repo,\
          \ head, base })\nif (existingPulls.length) {\n  console.log('Found existing\
          \ pull requests', existingPulls.map(pull => pull.number))\n  for (const\
          \ pull of existingPulls) {\n    await closePullRequest(pull.number)\n  }\n\
          \  console.log('Closed existing pull requests')\n}\n\ntry {\n  const { data\
          \ } = await github.rest.repos.compareCommits({\n    owner,\n    repo,\n\
          \    head,\n    base,\n  })\n  const { files } = data\n  console.log(`File\
          \ changes between ${head} and ${base}:`, files)\n  if (!files.length) {\n\
          \    console.log('No files changed, bailing')\n    return\n  }\n} catch\
          \ (err) {\n  console.error(`Unable to compute the files difference between\
          \ ${head} and ${base}`, err.message)\n}\n\nconsole.log('Creating a new pull\
          \ request')\nconst body = `\nThis is an automated pull request to sync changes\
          \ between the public and private repos.\nOur bot will merge this pull request\
          \ automatically.\nTo preserve continuity across repos, _do not squash_ this\
          \ pull request.\n`\nlet pull, pull_number\ntry {\n  const response = await\
          \ github.rest.pulls.create({\n    owner,\n    repo,\n    head,\n    base,\n\
          \    title: 'Repo sync',\n    body,\n  })\n  pull = response.data\n  pull_number\
          \ = pull.number\n  console.log('Created pull request successfully', pull.html_url)\n\
          } catch (err) {\n  // Don't error/alert if there's no commits to sync\n\
          \  // Don't throw if > 100 pulls with same head_sha issue\n  if (err.message?.includes('No\
          \ commits') || err.message?.includes('same head_sha')) {\n    console.log(err.message)\n\
          \    return\n  }\n  throw err\n}\n\nconsole.log('Locking conversations to\
          \ prevent spam')\ntry {\n  await github.rest.issues.lock({\n    ...context.repo,\n\
          \    issue_number: pull_number,\n    lock_reason: 'spam'\n  })\n  console.log('Locked\
          \ the pull request to prevent spam')\n} catch (error) {\n  console.error('Failed\
          \ to lock the pull request.', error)\n  // Don't fail the workflow\n}\n\n\
          console.log('Counting files changed')\nconst { data: prFiles } = await github.rest.pulls.listFiles({\
          \ owner, repo, pull_number })\nif (prFiles.length) {\n  console.log(prFiles.length,\
          \ 'files have changed')\n} else {\n  console.log('No files changed, closing')\n\
          \  await closePullRequest(pull_number)\n  return\n}\n\nconsole.log('Checking\
          \ for merge conflicts')\nif (pull.mergeable_state === 'dirty') {\n  console.log('Pull\
          \ request has a conflict', pull.html_url)\n  await closePullRequest(pull_number)\n\
          \  throw new Error('Pull request has a conflict, please resolve manually')\n\
          }\nconsole.log('No detected merge conflicts')\n\nconsole.log('Merging the\
          \ pull request')\n// Admin merge pull request to avoid squash\nawait github.rest.pulls.merge({\n\
          \  owner,\n  repo,\n  pull_number,\n  merge_method: 'merge',\n})\n// Error\
          \ loud here, so no try/catch\nconsole.log('Merged the pull request successfully')\n"
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
