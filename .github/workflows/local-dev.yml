name: Local development
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  local-dev:
    if: github.repository == 'github/docs-internal' || github.repository == 'github/docs'
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/node-npm-setup
    - uses: ./.github/actions/get-docs-early-access
      if: ${{ github.repository == 'github/docs-internal' }}
      with:
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
    - name: Disable Next.js telemetry
      run: npx next telemetry disable
    - name: Start server and basic smoke test
      run: "# Start server in background\nnpm start > /tmp/stdout.log 2> /tmp/stderr.log\
        \ &\nSERVER_PID=$!\n\n# Wait for server to be ready and test homepage\nif\
        \ curl --fail --retry-connrefused --retry 10 --retry-delay 2 http://localhost:4000/;\
        \ then\n  echo \"\u2705 Local dev server started successfully and serves homepage\"\
        \n  kill $SERVER_PID 2>/dev/null || true\nelse\n  echo \"\u274C Local dev\
        \ server failed to start or serve content\"\n  echo \"____STDOUT____\"\n \
        \ cat /tmp/stdout.log\n  echo \"____STDERR____\"\n  cat /tmp/stderr.log\n\
        \  kill $SERVER_PID 2>/dev/null || true\n  exit 1\nfi\n"
