name: Package lock lint
on:
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref
    || github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.repository == 'github/docs-internal' || github.repository == 'github/docs'
    steps:
    - name: Check out repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Setup Node.js
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
      with:
        node-version-file: package.json
        cache: npm
    - name: Run check
      run: "npm --version\n\n# Save the current top-level dependencies from package-lock.json\n\
        node -e \"console.log(JSON.stringify(require('./package-lock.json').packages['']))\"\
        \ > /tmp/before.json\n\n# From https://docs.npmjs.com/cli/v7/commands/npm-install\n\
        #\n#   The --package-lock-only argument will only update the\n#   package-lock.json,\
        \ instead of checking node_modules and\n#   downloading dependencies.\n#\n\
        npm install --package-lock-only --ignore-scripts --include=optional\n\n# Extract\
        \ the top-level dependencies after regeneration\nnode -e \"console.log(JSON.stringify(require('./package-lock.json').packages['']))\"\
        \ > /tmp/after.json\n\n# Compare only the top-level package dependencies\n\
        # This ignores platform-specific differences in nested dependency resolution\n\
        # (like \"peer\" flags) that don't affect actual installed versions\nif !\
        \ diff /tmp/before.json /tmp/after.json; then\n  echo \"ERROR: Top-level dependencies\
        \ in package-lock.json are out of sync with package.json\"\n  echo \"Please\
        \ run 'npm install' locally and commit the updated package-lock.json\"\n \
        \ exit 1\nfi\n\necho \"\u2713 Top-level dependencies are in sync\"\n"
