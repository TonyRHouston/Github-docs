name: docs-internal Moda CI
on:
  workflow_dispatch: {}
jobs:
  set-vault-keys:
    runs-on: ubuntu-latest
    outputs:
      modified_vault_keys: ${{ steps.modify_vault_keys.outputs.modified }}
    steps:
    - name: Set vault-keys output
      id: modify_vault_keys
      run: "if [ -z \"${{ vars.VAULT_KEYS }}\" ]; then\n  # We want to add the DOCS_BOT_PAT_BASE\
        \ to the list of keys\n  # so that builds fetch the secret from the docs-internal\
        \ vault\n  # where --environment is \"ci\"\n  echo \"modified=DOCS_BOT_PAT_BASE\"\
        \ >> $GITHUB_OUTPUT\nelse\n  echo \"modified=${{ vars.VAULT_KEYS }},DOCS_BOT_PAT_BASE\"\
        \ >> $GITHUB_OUTPUT\nfi\n"
  moda-config-bundle:
    if: ${{ github.repository == 'github/docs-internal' }}
    name: ${{ matrix.ci_job.job }}
    needs: set-vault-keys
    strategy:
      fail-fast: false
      matrix:
        ci_job:
        - job: docs-internal-moda-config-bundle
    uses: github/internal-actions/.github/workflows/moda.yml@main
    with:
      ci-formatted-job-name: ${{ matrix.ci_job.job }}
      vault-keys: ${{ needs.set-vault-keys.outputs.modified_vault_keys }}
    secrets:
      dx-bot-token: ${{ secrets.INTERNAL_ACTIONS_DX_BOT_ACCOUNT_TOKEN }}
      datadog-api-key: ${{ secrets.DATADOG_API_KEY }}
  docker-image:
    if: ${{ github.repository == 'github/docs-internal' }}
    name: ${{ matrix.ci_job.job }}
    needs: set-vault-keys
    strategy:
      fail-fast: false
      matrix:
        ci_job:
        - job: docs-internal-docker-image
    uses: github/internal-actions/.github/workflows/kube.yml@main
    with:
      ci-formatted-job-name: ${{ matrix.ci_job.job }}
      vault-keys: ${{ needs.set-vault-keys.outputs.modified_vault_keys }}
      attest: true
      docker-build-env-secrets: DOCS_BOT_PAT_BASE
    secrets:
      dx-bot-token: ${{ secrets.INTERNAL_ACTIONS_DX_BOT_ACCOUNT_TOKEN }}
      datadog-api-key: ${{ secrets.DATADOG_API_KEY }}
  docker-security:
    if: ${{ github.repository == 'github/docs-internal' }}
    name: ${{ matrix.ci_job.job }}
    needs: set-vault-keys
    strategy:
      fail-fast: false
      matrix:
        ci_job:
        - job: docs-internal-docker-security
    uses: github/internal-actions/.github/workflows/docker_security.yml@main
    with:
      ci-formatted-job-name: ${{ matrix.ci_job.job }}
      vault-keys: ${{ needs.set-vault-keys.outputs.modified_vault_keys }}
      docker-build-env-secrets: DOCS_BOT_PAT_BASE
    secrets:
      dx-bot-token: ${{ secrets.INTERNAL_ACTIONS_DX_BOT_ACCOUNT_TOKEN }}
      datadog-api-key: ${{ secrets.DATADOG_API_KEY }}
permissions:
  actions: read
  checks: read
  contents: read
  statuses: read
  id-token: write
  attestations: write
