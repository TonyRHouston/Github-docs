name: Stale check for no activity
on:
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  stale_contributor:
    name: Identify and close stale issues and PRs
    if: github.repository == 'github/docs'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@3a9db7e6a41a89f618792c92c0e97cc736e1b13f
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        days-before-stale: 30
        days-before-close: 7
        stale-issue-message: A stale label has been added to this issue, because it
          has been open for 30 days with no activity. If you think this issue should
          remain open, please add a new comment.
        exempt-issue-labels: help wanted,never-stale,waiting for review
        stale-issue-label: Inactive
        close-issue-label: Closed as inactive
        exempt-pr-labels: never-stale,ready to merge,waiting for review
        stale-pr-message: A stale label has been added to this pull request because
          it has been open 30 days with no activity. If you think this pull request
          should remain open, please add a new comment.
        stale-pr-label: Inactive
        close-pr-label: Closed as inactive
        staled-issues-prs: true
        closed-issues-prs: true
    - name: Check out repo
      if: ${{ failure() }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
  stale_staff:
    name: Remind staff about PRs waiting for review
    if: github.repository == 'github/docs'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@3a9db7e6a41a89f618792c92c0e97cc736e1b13f
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        only-labels: waiting for review
        days-before-pr-stale: 14
        days-before-pr-close: -1
        operations-per-run: 100
        stale-pr-message: This is a gentle reminder for the docs team that this pull
          request is waiting for review.
        stale-pr-label: Waiting on Docs team review
    - name: Print outputs
      run: echo "Staled issues/PRs:${{ steps.stale.outputs.staled-issues-prs || '0'
        }}, Closed issues/PRs:${{ steps.stale.outputs.closed-issues-prs || '0' }}"
    - name: Check out repo
      if: ${{ failure() }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
