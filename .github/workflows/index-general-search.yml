name: Index general search in Elasticsearch
on:
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }} @ ${{ github.head_ref }} ${{ github.event_name }}
    ${{ github.event.workflow_run.conclusion }}
  cancel-in-progress: true
env:
  ELASTICSEARCH_URL: ${{ secrets.ELASTICSEARCH_URL }}
  HYDRO_ENDPOINT: ''
  HYDRO_SECRET: ''
jobs:
  figureOutMatrix:
    if: ${{ github.repository == 'github/docs-internal' && (github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.result }}
    steps:
    - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      id: set-matrix
      with:
        script: "// Edit this list for the definitive list of languages\n// (other\
          \ than English) we want to index in Elasticsearch.\nconst allNonEnglish\
          \ = 'es,ja,pt,zh,ru,fr,ko,de'.split(',')\nconst allPossible = [\"en\", ...allNonEnglish]\n\
          \nif (context.eventName === \"workflow_run\") {\n  // Job-level `if` already\
          \ ensures we only get here for successful runs,\n  // but keep this as a\
          \ safety check.\n  if (context.payload.workflow_run.conclusion === \"success\"\
          ) {\n    return [\"en\"]\n  }\n  // This shouldn't happen due to job-level\
          \ filter, but handle gracefully.\n  console.warn(`Unexpected: workflow_run\
          \ with conclusion '${context.payload.workflow_run.conclusion}'`)\n  return\
          \ []\n}\n\nif (context.eventName === \"workflow_dispatch\") {\n  if (context.payload.inputs.languages)\
          \ {\n    const clean = context.payload.inputs.languages.split(',').map(x\
          \ => x.trim()).filter(Boolean)\n    const notRecognized = clean.find(x =>\
          \ !allPossible.includes(x))\n    if (notRecognized) {\n      throw new Error(`'${notRecognized}'\
          \ is not a recognized language code`)\n    }\n    return clean\n  }\n  return\
          \ allPossible\n}\n\nif (context.eventName === \"schedule\") {\n  return\
          \ allNonEnglish\n}\n\nconsole.log(context)\nthrow new Error(`Unable figure\
          \ out what languages to run (${context.eventName})`)\n"
    - name: Debug output
      run: echo "${{ steps.set-matrix.outputs.result }}"
    - name: Check out repo
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
  updateElasticsearchIndexes:
    needs: figureOutMatrix
    name: Update indexes
    if: ${{ github.repository == 'github/docs-internal' && needs.figureOutMatrix.outputs.matrix
      != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        language: ${{ fromJSON(needs.figureOutMatrix.outputs.matrix) }}
    steps:
    - name: Check out repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Clone docs-internal-data
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        repository: github/docs-internal-data
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
        path: docs-internal-data
    - name: Clone all translations
      if: ${{ matrix.language != 'en' }}
      uses: ./.github/actions/clone-translations
      with:
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
    - uses: ./.github/actions/node-npm-setup
    - uses: ./.github/actions/cache-nextjs
    - name: Run build scripts
      run: npm run build
    - name: Start the server in the background
      env:
        ENABLE_DEV_LOGGING: false
      run: 'npm run general-search-scrape-server > /tmp/stdout.log 2> /tmp/stderr.log
        &


        # first sleep to give it a chance to start

        sleep 6

        curl --retry-connrefused --retry 4 -I http://localhost:4002/

        '
    - if: ${{ failure() }}
      name: Debug server outputs on errors
      run: 'echo "____STDOUT____"

        cat /tmp/stdout.log

        echo "____STDERR____"

        cat /tmp/stderr.log

        '
    - name: Scrape records into a temp directory
      env:
        THROW_ON_EMPTY: false
        VERSION: ${{ inputs.version }}
        DOCS_INTERNAL_DATA: docs-internal-data
      run: "mkdir /tmp/records\nnpm run general-search-scrape -- /tmp/records \\\n\
        \  --language ${{ matrix.language }}\n\nls -lh /tmp/records\n"
    - name: Check for scraping failures
      id: check-failures
      run: "if [ -f /tmp/records/failures-summary.json ]; then\n  FAILED_PAGES=$(jq\
        \ -r '.totalFailedPages' /tmp/records/failures-summary.json)\n  echo \"failed_pages=$FAILED_PAGES\"\
        \ >> $GITHUB_OUTPUT\n  echo \"has_failures=true\" >> $GITHUB_OUTPUT\n  echo\
        \ \"\u26A0\uFE0F Warning: $FAILED_PAGES page(s) failed to scrape\"\nelse\n\
        \  echo \"has_failures=false\" >> $GITHUB_OUTPUT\n  echo \"\u2705 All pages\
        \ scraped successfully\"\nfi\n"
    - name: Check that Elasticsearch is accessible
      run: 'curl --fail --retry-connrefused --retry 5 -I ${{ env.ELASTICSEARCH_URL
        }}

        '
    - name: Index into Elasticsearch
      env:
        VERSION: ${{ inputs.version }}
      run: "npm run index-general-search -- /tmp/records \\\n  --language ${{ matrix.language\
        \ }} \\\n  --stagger-seconds 5 \\\n  --retries 5\n"
    - name: Check created indexes and aliases
      run: '# Not using `--fail` here because I''ve observed that it can fail

        # with a rather cryptic 404 error when it should, if anything, be

        # a 200 OK with a list of no indices.

        curl --retry-connrefused --retry 5 ${{ env.ELASTICSEARCH_URL }}/_cat/indices?v

        curl --retry-connrefused --retry 5 ${{ env.ELASTICSEARCH_URL }}/_cat/indices?v

        '
    - name: Purge Fastly edge cache
      env:
        FASTLY_TOKEN: ${{ secrets.FASTLY_TOKEN }}
        FASTLY_SERVICE_ID: ${{ secrets.FASTLY_SERVICE_ID }}
        FASTLY_SURROGATE_KEY: api-search:${{ matrix.language }}
      run: npm run purge-fastly-edge-cache
    - name: Alert on scraping failures
      if: ${{ steps.check-failures.outputs.has_failures == 'true' && github.event_name
        != 'workflow_dispatch' }}
      uses: ./.github/actions/slack-alert
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
        message: ':warning: ${{ steps.check-failures.outputs.failed_pages }} page(s)
          failed to scrape for general search indexing (language: ${{ matrix.language
          }})


          The indexing completed but some pages could not be scraped. This may affect
          search results for those pages.


          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
          github.run_id }}

          '
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
