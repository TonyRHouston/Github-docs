name: Comment on adding "needs SME" label
on:
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  add-issue-comment:
    if: ${{ github.repository == 'github/docs' && (github.event.label.name == 'needs
      SME' && github.event_name == 'issues') }}
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
      with:
        issue-number: ${{ github.event.issue.number }}
        body: 'Thanks for opening an issue! We''ve triaged this issue for technical
          review by a subject matter expert :eyes:

          '
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'pull_request_target' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
  add-pr-comment:
    if: ${{ github.repository == 'github/docs' && (github.event.label.name == 'needs
      SME' && github.event_name == 'pull_request_target') }}
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: 'Thanks for opening a pull request! We''ve triaged this issue for technical
          review by a subject matter expert :eyes:

          '
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'pull_request_target' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
