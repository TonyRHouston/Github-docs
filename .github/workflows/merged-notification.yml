name: Merged notification
on:
  workflow_dispatch: {}
permissions:
  issues: write
  pull-requests: write
  contents: read
jobs:
  comment:
    if: github.repository == 'github/docs' && github.event.pull_request.merged &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
      && github.event.pull_request.user.login != 'docs-bot'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      with:
        script: "github.rest.issues.createComment({\n  ...context.repo,\n  issue_number:\
          \ context.payload.pull_request.number,\n  body: \"Thanks very much for contributing!\
          \ Your pull request has been merged \U0001F389 You should see your changes\
          \ appear on the site in approximately 24 hours. If you're looking for your\
          \ next contribution, check out our [help wanted issues](https://github.com/github/docs/issues?q=is%3Aopen+is%3Aissue+label%3A%22help+wanted%22)\
          \ :zap:\"\n})\n"
