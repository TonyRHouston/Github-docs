name: Reviewers - Docs Engineering
on:
  workflow_dispatch: {}
permissions:
  contents: read
  pull-requests: write
  repository-projects: read
jobs:
  reviewers-docs-engineering:
    if: "${{ github.repository == 'github/docs-internal' &&\n    !github.event.pull_request.draft\
      \ &&\n    !contains(github.event.pull_request.labels.*.name, 'reviewers-docs-engineering')\
      \ &&\n    github.event.pull_request.head.ref != 'repo-sync' }}"
    runs-on: ubuntu-latest
    env:
      PR: ${{ github.event.pull_request.html_url }}
      GH_TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.1
    - name: Add docs engineering as a reviewer
      uses: ./.github/actions/retry-command
      with:
        command: gh pr edit $PR --add-reviewer github/docs-engineering --add-label
          reviewers-docs-engineering
