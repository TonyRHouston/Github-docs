name: Check Internal Links
on:
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
jobs:
  setup-matrix:
    if: github.repository == 'github/docs-internal'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/node-npm-setup
    - name: Set matrix
      id: set-matrix
      run: "if [[ \"${{ github.event_name }}\" == \"workflow_dispatch\" ]]; then\n\
        \  # Manual run: use the provided version and language\n  echo 'matrix={\"\
        include\":[{\"version\":\"${{ inputs.version }}\",\"language\":\"${{ inputs.language\
        \ }}\"}]}' >> $GITHUB_OUTPUT\nelse\n  # Scheduled run: English free-pro-team\
        \ + English latest enterprise-server\n  LATEST_GHES=$(npx tsx -e \"import\
        \ { latest } from './src/versions/lib/enterprise-server-releases'; console.log(latest)\"\
        )\n  echo \"matrix={\\\"include\\\":[{\\\"version\\\":\\\"free-pro-team@latest\\\
        \",\\\"language\\\":\\\"en\\\"},{\\\"version\\\":\\\"enterprise-server@${LATEST_GHES}\\\
        \",\\\"language\\\":\\\"en\\\"}]}\" >> $GITHUB_OUTPUT\nfi\n"
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
  check-internal-links:
    if: github.repository == 'github/docs-internal'
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    env:
      ELASTICSEARCH_URL: ''
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/node-npm-setup
    - name: Install dependencies
      run: npm ci
    - name: Clone translations
      if: matrix.language != 'en'
      uses: ./.github/actions/clone-translations
      with:
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
    - name: Check internal links
      env:
        VERSION: ${{ matrix.version }}
        LANGUAGE: ${{ matrix.language }}
        CHECK_ANCHORS: true
        ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
          github.run_id }}
      run: npm run check-links-internal
    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: link-report-${{ matrix.version }}-${{ matrix.language }}
        path: artifacts/link-report-*.md
        retention-days: 5
        if-no-files-found: ignore
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
  create-report:
    if: always() && github.repository == 'github/docs-internal'
    needs:
    - setup-matrix
    - check-internal-links
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Download all artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
      with:
        path: reports
        pattern: link-report-*
        merge-multiple: true
    - name: Combine reports
      id: combine
      run: "# Check if any reports exist\nif ls reports/*.md 1> /dev/null 2>&1; then\n\
        \  echo \"has_reports=true\" >> $GITHUB_OUTPUT\n\n  # Combine all markdown\
        \ reports\n  echo \"# Internal Links Report\" > combined-report.md\n  echo\
        \ \"\" >> combined-report.md\n  echo \"Generated: $(date -u +'%Y-%m-%d %H:%M\
        \ UTC')\" >> combined-report.md\n  echo \"[Action run](${{ github.server_url\
        \ }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\" >> combined-report.md\n\
        \  echo \"\" >> combined-report.md\n\n  for report in reports/*.md; do\n \
        \   echo \"---\" >> combined-report.md\n    cat \"$report\" >> combined-report.md\n\
        \    echo \"\" >> combined-report.md\n  done\nelse\n  echo \"has_reports=false\"\
        \ >> $GITHUB_OUTPUT\n  echo \"No broken link reports generated - all links\
        \ valid!\"\nfi\n"
    - name: Create issue if broken links found
      if: steps.combine.outputs.has_reports == 'true'
      uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710
      with:
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
        repository: github/docs-content
        title: "\U0001F517 Broken Internal Links Report"
        content-filepath: combined-report.md
        labels: broken link report
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
