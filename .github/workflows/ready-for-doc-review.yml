name: Ready for docs-content review
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  request_doc_review:
    name: Request a review from the docs-content team
    if: github.repository_owner == 'github' && github.repository != 'github/docs'
      && (github.event.label.name == 'ready-for-doc-review' || github.event.requested_team.name
      == 'docs-content' || github.event.requested_team.name == 'docs-reviewers')
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo content
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        repository: github/docs-internal
        token: ${{ secrets.DOCS_BOT_PAT_BASE }}
    - name: Setup Node.js
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
      with:
        node-version-file: package.json
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Set AUTHOR_LOGIN
      run: "if [[ \"${{ github.event.pull_request.assignee.login && github.event.pull_request.user.login\
        \ == 'docs-bot' }}\" ]]; then\n  echo \"AUTHOR_LOGIN=${{ github.event.pull_request.assignee.login\
        \ }}\" >> $GITHUB_ENV\nelse\n  echo \"AUTHOR_LOGIN=${{ github.event.pull_request.user.login\
        \ }}\" >> $GITHUB_ENV\nfi\n"
    - name: Run script
      run: 'npm run ready-for-docs-review

        '
      env:
        TOKEN: ${{ secrets.DOCS_BOT_PAT_BASE }}
        PROJECT_NUMBER: 2936
        ORGANIZATION: github
        ITEM_NODE_ID: ${{ github.event.pull_request.node_id }}
        REPO: ${{ github.event.pull_request.base.repo.full_name }}
