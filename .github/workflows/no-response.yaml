name: Stale check for no response from author
on:
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
  pull-requests: write
jobs:
  noResponse:
    runs-on: ubuntu-latest
    if: github.repository == 'github/docs'
    steps:
    - uses: actions/stale@3a9db7e6a41a89f618792c92c0e97cc736e1b13f
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        only-labels: more-information-needed
        days-before-issue-stale: 21
        days-before-issue-close: 1
        stale-issue-label: Waiting on contributor
        close-issue-message: 'This issue has been automatically closed because there
          has been no response to our request for more information from the original
          author. With only the information that is currently in the issue, we don''t
          have enough information to take action. Please reach out if you have or
          find the answers we need so that we can investigate further. See [this blog
          post on bug reports and the importance of repro steps](https://www.lee-dohm.com/2015/01/04/writing-good-bug-reports/)
          for more information about the kind of information that may be helpful.

          '
        days-before-pr-stale: 21
        days-before-pr-close: 1
        stale-pr-label: Waiting on contributor
        close-pr-message: 'This PR has been automatically closed because there has
          been no response to to our request for more information from the original
          author. Please reach out if you have the information we requested, or open
          an [issue](https://github.com/github/docs/issues/new/choose) to describe
          your changes. Then we can reopen this PR and begin the review process.

          '
    - name: Print outputs
      run: echo "Staled issues/PRs:${{ steps.stale.outputs.staled-issues-prs || '0'
        }}, Closed issues/PRs:${{ steps.stale.outputs.closed-issues-prs || '0' }}"
    - name: Check out repo
      if: ${{ failure() }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - uses: ./.github/actions/slack-alert
      if: ${{ failure() }}
      with:
        slack_channel_id: ${{ secrets.DOCS_ALERTS_SLACK_CHANNEL_ID }}
        slack_token: ${{ secrets.SLACK_DOCS_BOT_TOKEN }}
